name: Deploy Dev Socket Server

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /var/www/kashrid-suite-realtime-dev

            git fetch origin dev
            git reset --hard origin/dev

            bun install
            bun run build

            pm2 restart kashrid-suite-realtime-dev || pm2 start "bun run start" --name kashrid-suite-realtime-dev

            pm2 save